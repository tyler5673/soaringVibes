<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200" width="400" height="200">
  <defs>
    <linearGradient id="skyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#87CEEB;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E0F7FA;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="oceanGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0077B6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#023E8A;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Sky -->
  <rect x="0" y="0" width="400" height="120" fill="url(#skyGrad)"/>
  
  <!-- Ocean -->
  <rect x="0" y="120" width="400" height="80" fill="url(#oceanGrad)"/>
  
  <!-- Island -->
  <ellipse cx="200" cy="140" rx="120" ry="30" fill="#4CAF50"/>
  <ellipse cx="200" cy="135" rx="80" ry="20" fill="#66BB6A"/>
  
  <!-- Palm tree trunk -->
  <path d="M260 145 Q270 100 265 60" stroke="#8B4513" stroke-width="6" fill="none" stroke-linecap="round"/>
  
  <!-- Palm fronds -->
  <g stroke="#228B22" stroke-width="3" fill="none">
    <path d="M265 60 Q290 40 310 50"/>
    <path d="M265 60 Q280 30 290 25"/>
    <path d="M265 60 Q260 25 250 20"/>
    <path d="M265 60 Q240 35 225 40"/>
    <path d="M265 60 Q250 45 235 55"/>
  </g>
  
  <!-- Plane silhouette -->
  <g transform="translate(80, 70) rotate(-15)">
    <!-- Fuselage -->
    <ellipse cx="50" cy="15" rx="35" ry="6" fill="#fff"/>
    <!-- Wings -->
    <path d="M45 15 L20 0 L25 15 L20 30 Z" fill="#fff"/>
    <!-- Tail -->
    <path d="M80 15 L90 5 L95 15 L90 25 Z" fill="#fff"/>
    <!-- Propeller -->
    <line x1="12" y1="15" x2="5" y2="0" stroke="#333" stroke-width="2"/>
    <line x1="12" y1="15" x2="5" y2="30" stroke="#333" stroke-width="2"/>
  </g>
  
  <!-- Text -->
  <text x="200" y="180" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="white" text-anchor="middle" style="text-shadow: 2px 2px 4px #000;">
    Flying Vibes
  </text>
</svg>
