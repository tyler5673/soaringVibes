<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flight Simulator</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="loading">
        <img src="assets/images/logo.png" id="loading-logo" alt="Flying Vibes">
        <div class="loader"></div>
        <div id="loading-text">Loading Flight Simulator...</div>
        <div id="loading-bar"><div id="loading-bar-fill"></div></div>
        <div id="loading-progress">0%</div>
    </div>
    <div id="hud">
        <div id="speed">Speed: <span id="speed-value">0</span> kts</div>
        <div id="altitude">Altitude: <span id="altitude-value">0</span> ft</div>
        <div id="throttle">Throttle: <span id="throttle-value">0</span>%</div>
        <div id="controls-hint">WASD: Pitch/Roll | QE: Yaw | Shift/Ctrl: Throttle | Space: Brake | R: Reset</div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/controls.js"></script>
    <script src="js/aircraft.js"></script>
    <script src="js/camera.js"></script>
    <script src="js/environment.js"></script>
    <script src="js/islands.js"></script>
    <script src="js/airport.js"></script>
    <script src="js/wildlife.js"></script>
    <script src="js/performance.js"></script>
    <script src="js/flora.js"></script>
    <script src="js/fauna.js"></script>
    <script>
        // ========== MAIN ==========
        let scene, camera, renderer;
        let aircraft;
        let orbitCamera;
        let cloudSystem;
        let wildlife;
        let clock;
        let speedEl, altitudeEl, throttleEl;
        let loadedItems = 0;
        let totalItems = 8;
        
        function updateLoading(progress) {
            const progressEl = document.getElementById('loading-progress');
            const barFillEl = document.getElementById('loading-bar-fill');
            if (progressEl) progressEl.textContent = progress + '%';
            if (barFillEl) barFillEl.style.width = progress + '%';
        }
        
        function hideLoading() {
            const el = document.getElementById('loading');
            if (el) {
                el.classList.add('hidden');
                setTimeout(() => el.style.display = 'none', 500);
            }
        }

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87CEEB);
            scene.fog = new THREE.Fog(0x87CEEB, 2000, 15000);
            
            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100000);
            camera.position.set(0, 150, -600);
            
            renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.shadowMap.enabled = true;
            document.body.appendChild(renderer.domElement);
            
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
            scene.add(ambientLight);
            
            initControls();
            
            clock = new THREE.Clock();
            
            aircraft = new Aircraft();
            scene.add(aircraft.mesh);
            
            orbitCamera = new OrbitCamera(camera, aircraft);
            
            createSky(scene);
            createOcean(scene);
            
            cloudSystem = new CloudSystem(scene);
            
            updateLoading(10);
            createAllIslands(scene, (progress) => {
                updateLoading(10 + Math.round(progress * 0.8));
            }).then(() => {
                updateLoading(100);
                setTimeout(hideLoading, 300);
            });
            
            wildlife = new Wildlife(scene);
            
            window.addEventListener('resize', onWindowResize);

            speedEl = document.getElementById('speed-value');
            altitudeEl = document.getElementById('altitude-value');
            throttleEl = document.getElementById('throttle-value');

            animate();
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();
            const time = clock.getElapsedTime();
            
            updateOceanWaves(time);
            
            const input = getKeyboardInput();
            const mouseInput = getMouseInput();
            
            orbitCamera.handleMouseInput(mouseInput.deltaX, mouseInput.deltaY);
            orbitCamera.handleScroll(mouseInput.scrollDelta);
            
            const controlInput = {
                pitch: (input.pitchUp ? -1 : 0) + (input.pitchDown ? 1 : 0),
                roll: (input.rollLeft ? -1 : 0) + (input.rollRight ? 1 : 0),
                yaw: (input.yawLeft ? -1 : 0) + (input.yawRight ? 1 : 0)
            };
            aircraft.setControlInput(controlInput);
            aircraft.updateThrottle(input.throttleUp, input.throttleDown, delta);
            aircraft.update(delta);
            
            if (speedEl) speedEl.textContent = Math.round(aircraft.ias);
            if (altitudeEl) altitudeEl.textContent = Math.round(aircraft.altitude * 3.281);
            if (throttleEl) throttleEl.textContent = Math.round(aircraft.throttle * 100);

            if (input.reset) {
                aircraft.reset();
            }
            
            orbitCamera.update(delta);
            cloudSystem.update(delta, time);
            wildlife.update(delta);
            
            // Update flora LOD and culling
            if (window.floraManager) {
                window.floraManager.update(delta);
            }
            
            renderer.render(scene, camera);
        }

        init();
    </script>
</body>
</html>
