<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flight Simulator</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="loading">
        <img src="assets/images/logo.png" id="loading-logo" alt="Soaring Vibes">
        <div class="loader"></div>
        <div id="loading-text">Loading Flight Simulator...</div>
        <div id="loading-bar"><div id="loading-bar-fill"></div></div>
        <div id="loading-progress">0%</div>
        <div id="loading-tribute">For Bessie...<br>may your sacrifice never be forgotten</div>
        <div id="loading-version">v0.0.1</div>
    </div>
    <div id="hud">
        <div class="gauges">
            <div class="gauge-container">
                <svg class="gauge" id="speed-gauge" viewBox="0 0 120 120">
                    <defs>
                        <linearGradient id="gaugeFace" x1="0%" y1="0%" x2="0%" y2="100%">
                            <stop offset="0%" stop-color="#f5f5f5"/>
                            <stop offset="100%" stop-color="#d0d0d0"/>
                        </linearGradient>
                    </defs>
                    <circle cx="60" cy="60" r="55" fill="url(#gaugeFace)" stroke="#333" stroke-width="3"/>
                    <circle cx="60" cy="60" r="50" fill="none" stroke="#222" stroke-width="1"/>
                    <!-- Speed markings -->
                    <g class="gauge-marks" id="speed-marks"></g>
                    <g class="gauge-labels" id="speed-labels"></g>
                    <!-- Colored arcs -->
                    <path class="gauge-green-arc" d="M 25 85 A 45 45 0 0 1 95 85" fill="none" stroke="rgba(0,128,0,0.3)" stroke-width="12"/>
                    <path class="gauge-red-arc" d="M 95 85 A 45 45 0 0 1 95 45" fill="none" stroke="rgba(200,0,0,0.3)" stroke-width="12"/>
                    <!-- Needle -->
                    <g id="speed-needle">
                        <polygon points="60,20 57,60 60,65 63,60" fill="#c00"/>
                        <circle cx="60" cy="60" r="6" fill="#333"/>
                    </g>
                    <text x="60" y="100" text-anchor="middle" font-size="10" font-family="Arial" fill="#333">KTS</text>
                </svg>
            </div>
            <div class="gauge-container">
                <svg class="gauge" id="altitude-gauge" viewBox="0 0 120 120">
                    <circle cx="60" cy="60" r="55" fill="url(#gaugeFace)" stroke="#333" stroke-width="3"/>
                    <circle cx="60" cy="60" r="50" fill="none" stroke="#222" stroke-width="1"/>
                    <g class="gauge-marks" id="altitude-marks"></g>
                    <g class="gauge-labels" id="altitude-labels"></g>
                    <g id="altitude-needles">
                        <g class="alt-needle" id="alt-needle-10k">
                            <polygon points="60,25 58,60 60,63 62,60" fill="#333"/>
                        </g>
                        <g class="alt-needle" id="alt-needle-1k">
                            <polygon points="60,30 57,60 60,68 63,60" fill="#111"/>
                        </g>
                        <g class="alt-needle" id="alt-needle-100">
                            <polygon points="60,35 55,60 60,78 65,60" fill="#c00"/>
                        </g>
                        <circle cx="60" cy="60" r="6" fill="#333"/>
                    </g>
                    <text x="60" y="100" text-anchor="middle" font-size="10" font-family="Arial" fill="#333">FT</text>
                </svg>
            </div>
            <div class="gauge-container">
                <svg class="gauge" id="throttle-gauge" viewBox="0 0 120 120">
                    <circle cx="60" cy="60" r="55" fill="url(#gaugeFace)" stroke="#333" stroke-width="3"/>
                    <circle cx="60" cy="60" r="50" fill="none" stroke="#222" stroke-width="1"/>
                    <g class="gauge-marks" id="throttle-marks"></g>
                    <g class="gauge-labels" id="throttle-labels"></g>
                    <path d="M 25 85 A 45 45 0 0 1 95 85" fill="none" stroke="rgba(200,180,0,0.3)" stroke-width="12"/>
                    <g id="throttle-needle">
                        <polygon points="60,20 57,60 60,65 63,60" fill="#333"/>
                        <circle cx="60" cy="60" r="6" fill="#c00"/>
                    </g>
                    <text x="60" y="100" text-anchor="middle" font-size="10" font-family="Arial" fill="#333">%</text>
                </svg>
            </div>
        </div>
        <div id="controls-hint">WASD: Pitch/Roll | QE: Yaw | Shift/Ctrl: Throttle | Space: Brake | R: Reset</div>
    </div>
    <div id="crash-message">
        <div class="crash-text">Crashed!</div>
        <button id="reset-btn" onclick="aircraft.reset(); hideCrashMessage();">Reset</button>
    </div>
    <div id="touch-controls" style="display: none;">
        <!-- Left side: Throttle slider -->
        <div id="throttle-zone" class="throttle-container">
            <div class="throttle-track">
                <div id="throttle-handle" class="throttle-handle"></div>
            </div>
            <div class="touch-label">THROTTLE</div>
        </div>
        
        <!-- Right stick: Pitch (vertical) + Roll (horizontal) + Yaw (requires new zone) -->
        <div id="right-stick-zone" class="touch-zone">
            <div id="right-stick" class="touch-stick"></div>
            <div class="touch-label">Pitch/Roll</div>
        </div>
        
        <!-- Yaw buttons below right stick -->
        <div id="yaw-controls" class="yaw-container">
            <div id="yaw-left-btn" class="yaw-button">↺</div>
            <div id="yaw-right-btn" class="yaw-button">↻</div>
        </div>
        
        <!-- Reset button -->
        <div id="reset-btn-touch" class="touch-button reset">RESET</div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/controls.js"></script>
    <script src="js/aircraft.js"></script>
    <script src="js/camera.js"></script>
    <script src="js/environment.js"></script>
    <script src="js/islands.js"></script>
    <script src="js/airport.js"></script>
    <script src="js/wildlife.js"></script>
    <script src="js/gauges.js"></script>
    <script src="js/performance.js"></script>
    <script src="js/spatial-grid.js"></script>
    
    <!-- Tree Geometry Classes -->
    <script src="js/trees/palm.js"></script>
    <script src="js/trees/coconut-palm.js"></script>
    <script src="js/trees/koa.js"></script>
    <script src="js/trees/giant-koa.js"></script>
    <script src="js/trees/ohia.js"></script>
    <script src="js/trees/banyan.js"></script>
    <script src="js/trees/tree-fern.js"></script>
    <script src="js/trees/ti-plant.js"></script>
    <script src="js/trees/bamboo.js"></script>
    <script src="js/trees/wiliwili.js"></script>
    <script src="js/trees/shrub.js"></script>
    <script src="js/trees/grass.js"></script>
    <script src="js/trees/ground-fern.js"></script>
    <script src="js/trees/naupaka.js"></script>
    <script src="js/trees/beach-morning-glory.js"></script>
    <script src="js/trees/driftwood.js"></script>
    <script src="js/trees/lava-rock.js"></script>
    <script src="js/flora-manager.js"></script>
    <script src="js/hot-air-balloons.js"></script>
    
    <!-- Animal Base Class -->
    <script src="js/animals/animal-base.js"></script>
    <!-- Animal Species -->
    <script src="js/animals/whale.js"></script>
    <script src="js/animals/dolphin.js"></script>
    <script src="js/animals/seaturtle.js"></script>
    <script src="js/animals/albatross.js"></script>
    <script src="js/animals/frigatebird.js"></script>
    <script src="js/animals/honeycreeper.js"></script>
    <script src="js/animals/nene.js"></script>
    <script src="js/fauna-manager.js"></script>
    <script>
        // ========== MAIN ==========
        let scene, camera, renderer;
        let aircraft;
        let orbitCamera;
        let cloudSystem;
        let wildlife;
        let clock;
        
        function updateLoading(progress) {
            const progressEl = document.getElementById('loading-progress');
            const barFillEl = document.getElementById('loading-bar-fill');
            if (progressEl) progressEl.textContent = progress + '%';
            if (barFillEl) barFillEl.style.width = progress + '%';
        }
        
        function hideLoading() {
            const el = document.getElementById('loading');
            if (el) {
                // Fade out everything except the logo
                const loader = el.querySelector('.loader');
                const loadingText = el.querySelector('#loading-text');
                const loadingBar = el.querySelector('#loading-bar');
                const loadingProgress = el.querySelector('#loading-progress');
                const loadingTribute = el.querySelector('#loading-tribute');
                const loadingVersion = el.querySelector('#loading-version');
                const background = el.querySelector('#loading-bg');
                
                // Fade out loading elements
                [loader, loadingText, loadingBar, loadingProgress, loadingTribute, loadingVersion].forEach(item => {
                    if (item) item.style.transition = 'opacity 0.5s ease-out';
                });
                
                // Fade out background
                if (background) {
                    background.style.transition = 'opacity 0.8s ease-out';
                    background.style.opacity = '0';
                }
                
                // After 2 seconds, fade out the logo and remove everything
                setTimeout(() => {
                    const logo = el.querySelector('#loading-logo');
                    if (logo) {
                        logo.style.transition = 'opacity 0.8s ease-out';
                        logo.style.opacity = '0';
                    }
                    setTimeout(() => {
                        el.style.display = 'none';
                    }, 800);
                }, 2000);
            }
        }

        function init() {
            scene = new THREE.Scene();
            // Warm afternoon sky
            scene.background = new THREE.Color(0x87CEEB);
            scene.fog = new THREE.Fog(0x87CEEB, 2000, 15000);
            
            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100000);
            camera.position.set(0, 150, -600);
            window.camera = camera; // Make globally accessible for FloraManager
            
            renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.shadowMap.enabled = true;
            document.body.appendChild(renderer.domElement);
            
            initControls();
            
            clock = new THREE.Clock();
            
            aircraft = new Aircraft();
            scene.add(aircraft.mesh);
            
            orbitCamera = new OrbitCamera(camera, aircraft);
            
            // Initialize touch camera controls for mobile
            initTouchCameraControls(orbitCamera);
            
            createSky(scene);
            createOcean(scene, camera);
            
            cloudSystem = new CloudSystem(scene);
            
            updateLoading(10);
            createAllIslands(scene, (progress) => {
                updateLoading(10 + Math.round(progress * 0.8));
            }).then(() => {
                updateLoading(90);
                
                // Set aircraft to random start position near an island
                aircraft.setRandomStartPosition();
                
                // Initialize fauna after islands are loaded
                const faunaManager = new FaunaManager(scene, camera);
                faunaManager.init();
                window.faunaManager = faunaManager;
                
                // Initialize hot air balloon system
                const balloonSystem = new HotAirBalloonSystem(scene, camera);
                window.balloonSystem = balloonSystem;
                
                // Initialize performance monitor
                const perfMonitor = new PerformanceMonitor();
                window.perfMonitor = perfMonitor;
                
                // Initialize gauge system
                const gaugeSystem = new GaugeSystem();
                window.gaugeSystem = gaugeSystem;
                
                updateLoading(100);
                setTimeout(hideLoading, 300);
            });
            
            // Keep old wildlife for backward compatibility (balloons)
            wildlife = new Wildlife(scene);
            
            window.addEventListener('resize', onWindowResize);

            animate();
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function hideCrashMessage() {
            const crashMsg = document.getElementById('crash-message');
            if (crashMsg) {
                crashMsg.classList.remove('visible');
            }
        }

        function showCrashMessage() {
            const crashMsg = document.getElementById('crash-message');
            if (crashMsg) {
                crashMsg.classList.add('visible');
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();
            const time = clock.getElapsedTime();
            
            updateOceanWaves(time);
            
            const keyboardInput = getKeyboardInput();
            const touchInputData = getTouchInput();
            const mouseInput = getMouseInput();
            
            // Merge keyboard and touch inputs (touch takes priority if active)
            const input = {
                pitchUp: keyboardInput.pitchUp || touchInputData.pitch < -0.1,
                pitchDown: keyboardInput.pitchDown || touchInputData.pitch > 0.1,
                rollLeft: keyboardInput.rollLeft || touchInputData.roll < -0.1,
                rollRight: keyboardInput.rollRight || touchInputData.roll > 0.1,
                yawLeft: keyboardInput.yawLeft || touchInputData.yaw < -0.1,
                yawRight: keyboardInput.yawRight || touchInputData.yaw > 0.1,
                throttleUp: keyboardInput.throttleUp,
                throttleDown: keyboardInput.throttleDown,
                brake: keyboardInput.brake,
                reset: keyboardInput.reset || touchInputData.reset
            };
            
            orbitCamera.handleMouseInput(mouseInput.deltaX, mouseInput.deltaY);
            orbitCamera.handleScroll(mouseInput.scrollDelta);
            
            const controlInput = {
                pitch: (input.pitchUp ? -1 : 0) + (input.pitchDown ? 1 : 0),
                roll: (input.rollLeft ? -1 : 0) + (input.rollRight ? 1 : 0),
                yaw: (input.yawLeft ? -1 : 0) + (input.yawRight ? 1 : 0)
            };
            
            // Check for crash
            if (aircraft.checkCrash()) {
                showCrashMessage();
            }
            
            // If crashed, don't allow normal flight controls unless reset
            const crashMsg = document.getElementById('crash-message');
            const isCrashed = crashMsg && crashMsg.classList.contains('visible');
            
            if (!isCrashed) {
                aircraft.setControlInput(controlInput);
                
                // Handle throttle - mobile uses direct slider value, desktop uses up/down buttons
                if (isTouchDevice()) {
                    aircraft.setThrottle(touchInputData.throttle);
                } else {
                    aircraft.updateThrottle(input.throttleUp, input.throttleDown, delta);
                }
                
                aircraft.update(delta);
            }
            
            if (window.gaugeSystem) {
                window.gaugeSystem.updateSpeed(aircraft.ias);
                window.gaugeSystem.updateAltitude(aircraft.altitude * 3.281);
                window.gaugeSystem.updateThrottle(aircraft.throttle * 100);
            }

            if (input.reset) {
                hideCrashMessage();
                aircraft.reset();
            }
            
            orbitCamera.update(delta);
            cloudSystem.update(delta, time);
            wildlife.update(delta);
            
            // Update flora LOD and culling
            if (window.floraManager) {
                window.floraManager.update(delta);
            }
            
            // Update fauna (animals)
            if (window.faunaManager) {
                window.faunaManager.update(delta);
            }
            
            // Update hot air balloons
            if (window.balloonSystem) {
                window.balloonSystem.update(delta);
            }
            
            // Update performance monitor
            if (window.perfMonitor) {
                window.perfMonitor.update();
            }
            
            renderer.render(scene, camera);
        }

        init();
    </script>
</body>
</html>
