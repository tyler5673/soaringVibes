        <img src="assets/images/icon.png" alt="Menu">
    </div>
    <div id="hud">
        <div class="gauges">
            <!-- Airspeed Indicator -->
            <div class="gauge-container">
                <svg class="gauge" id="speed-gauge" viewBox="0 0 140 140">
                    <defs>
                        <linearGradient id="gaugeFace" x1="0%" y1="0%" x2="0%" y2="100%">
                            <stop offset="0%" stop-color="#e8e4dc"/>
                            <stop offset="50%" stop-color="#d4cfc4"/>
                            <stop offset="100%" stop-color="#b8b2a4"/>
                        </linearGradient>
                        <linearGradient id="gaugeBezel" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" stop-color="#8a8478"/>
                            <stop offset="50%" stop-color="#5c5850"/>
                            <stop offset="100%" stop-color="#3a3732"/>
                        </linearGradient>
                        <filter id="gaugeShadow" x="-20%" y="-20%" width="140%" height="140%">
                            <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.4"/>
                        </filter>
                        <linearGradient id="glassShine" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" stop-color="rgba(255,255,255,0.3)"/>
                            <stop offset="40%" stop-color="rgba(255,255,255,0)"/>
                            <stop offset="100%" stop-color="rgba(255,255,255,0.05)"/>
                        </linearGradient>
                    </defs>
                    <!-- Outer bezel -->
                    <circle cx="70" cy="70" r="68" fill="url(#gaugeBezel)"/>
                    <!-- Inner bezel ring -->
                    <circle cx="70" cy="70" r="62" fill="#2a2824" stroke="#1a1815" stroke-width="2"/>
                    <!-- Gauge face -->
                    <circle cx="70" cy="70" r="58" fill="url(#gaugeFace)" filter="url(#gaugeShadow)"/>
                    <!-- Inner ring -->
                    <circle cx="70" cy="70" r="54" fill="none" stroke="#99948a" stroke-width="1"/>
                    <!-- Speed markings -->
                    <g class="gauge-marks" id="speed-marks"></g>
                    <g class="gauge-labels" id="speed-labels"></g>
                    <!-- Colored arcs - Cessna 182 normal operating range -->
                    <path d="M 28 100 A 50 50 0 0 1 112 100" fill="none" stroke="rgba(0,120,0,0.25)" stroke-width="14"/>
                    <path d="M 112 100 A 50 50 0 0 1 112 55" fill="none" stroke="rgba(180,0,0,0.2)" stroke-width="14"/>
                    <!-- Warning arc -->
                    <path d="M 20 95 A 55 55 0 0 1 28 100" fill="none" stroke="rgba(200,150,0,0.3)" stroke-width="3"/>
                    <!-- Screw detail -->
                    <circle cx="70" cy="118" r="4" fill="#555"/>
                    <circle cx="70" cy="118" r="2" fill="#333"/>
                    <line x1="68" y1="116" x2="72" y2="120" stroke="#777" stroke-width="1"/>
                    <!-- Needle -->
                    <g id="speed-needle">
                        <polygon points="70,22 66,70 70,78 74,70" fill="#1a1a1a"/>
                        <polygon points="70,28 68,68 70,72 72,68" fill="#c41e3a"/>
                        <circle cx="70" cy="70" r="8" fill="#1a1a1a"/>
                        <circle cx="70" cy="70" r="5" fill="#888"/>
                    </g>
                    <text x="70" y="108" text-anchor="middle" font-size="9" font-family="'Courier New', monospace" font-weight="bold" fill="#222">KTS</text>
                    <!-- Glass effect -->
                    <circle cx="70" cy="70" r="55" fill="url(#glassShine)" opacity="0.4"/>
                </svg>
                <div class="gauge-label">AIRSPEED</div>
            </div>
            
            <!-- Altimeter -->
            <div class="gauge-container">
                <svg class="gauge" id="altitude-gauge" viewBox="0 0 140 140">
                    <circle cx="70" cy="70" r="68" fill="url(#gaugeBezel)"/>
                    <circle cx="70" cy="70" r="62" fill="#2a2824" stroke="#1a1815" stroke-width="2"/>
                    <circle cx="70" cy="70" r="58" fill="url(#gaugeFace)" filter="url(#gaugeShadow)"/>
                    <circle cx="70" cy="70" r="54" fill="none" stroke="#99948a" stroke-width="1"/>
                    <g class="gauge-marks" id="altitude-marks"></g>
                    <g class="gauge-labels" id="altitude-labels"></g>
                    <!-- Screw detail -->
                    <circle cx="70" cy="118" r="4" fill="#555"/>
                    <circle cx="70" cy="118" r="2" fill="#333"/>
                    <line x1="68" y1="116" x2="72" y2="120" stroke="#777" stroke-width="1"/>
                    <!-- Altimeter needles -->
                    <g id="altitude-needles">
                        <g class="alt-needle" id="alt-needle-10k">
                            <polygon points="70,28 67,70 70,74 73,70" fill="#1a1a1a" stroke="#333" stroke-width="1"/>
                        </g>
                        <g class="alt-needle" id="alt-needle-1k">
                            <polygon points="70,32 66,70 70,82 74,70" fill="#1a1a1a"/>
                        </g>
                        <g class="alt-needle" id="alt-needle-100">

                        </g>

                    <circle cx="70" cy="70" r="55" fill="url(#glassShine)" opacity="0.4"/>
                </svg>
                <div class="gauge-label">ALTITUDE</div>
            </div>
            
            <!-- Throttle -->
            <div class="gauge-container throttle-gauge">
                <svg class="gauge" id="throttle-gauge" viewBox="0 0 140 140">
                    <circle cx="70" cy="70" r="68" fill="url(#gaugeBezel)"/>
                    <circle cx="70" cy="70" r="62" fill="#2a2824" stroke="#1a1815" stroke-width="2"/>
                    <circle cx="70" cy="70" r="58" fill="url(#gaugeFace)" filter="url(#gaugeShadow)"/>
                    <circle cx="70" cy="70" r="54" fill="none" stroke="#99948a" stroke-width="1"/>
                    <g class="gauge-marks" id="throttle-marks"></g>
                    <g class="gauge-labels" id="throttle-labels"></g>
                    <!-- Throttle arc - yellow for power -->
                    <path d="M 28 100 A 50 50 0 0 1 112 100" fill="none" stroke="rgba(180,150,0,0.3)" stroke-width="14"/>
                    <!-- Screw detail -->
                    <circle cx="70" cy="118" r="4" fill="#555"/>
                    <circle cx="70" cy="118" r="2" fill="#333"/>
                    <line x1="68" y1="116" x2="72" y2="120" stroke="#777" stroke-width="1"/>
                    <!-- Needle -->
                    <g id="throttle-needle">
                        <polygon points="70,22 66,70 70,78 74,70" fill="#1a1a1a"/>
                        <polygon points="70,28 68,68 70,72 72,68" fill="#b8860b"/>
                        <circle cx="70" cy="70" r="8" fill="#1a1a1a"/>
                        <circle cx="70" cy="70" r="5" fill="#888"/>
                    </g>
                    <text x="70" y="108" text-anchor="middle" font-size="9" font-family="'Courier New', monospace" font-weight="bold" fill="#222">% THROTTLE</text>
                    <circle cx="70" cy="70" r="55" fill="url(#glassShine)" opacity="0.4"/>
                </svg>
                <div class="gauge-label">THROTTLE</div>
            </div>
        </div>
        <div id="controls-hint">WASD: Pitch/Roll | QE: Yaw | Shift/Ctrl: Throttle | Space: Brake | R: Reset</div>
    </div>
    <div id="crash-message">
        <div class="crash-text">Crashed!</div>
        <button id="reset-btn" onclick="aircraft.reset(); hideCrashMessage(); orbitCamera.resetBehindTarget();">Reset</button>
    </div>

        <!-- Back to menu button -->
        <div id="menu-btn" class="menu-button" title="Change name or colors">

    <script>
// ========== NAME & COLOR SELECTION ==========
const planeNames = [
    "Spirit", "Wanderer", "Phantom", "Valkyrie", "Thunder", "Shadow",
    "Aurora", "Venom", "Blaze", "Storm", "Ghost", "Raptor",
    "Falcon", "Eagle", "Hawk", "Viper", "Specter", "Wraith",
    "Nighthawk", "Silver Arrow", "Midnight", "Golden Eagle", "White Knight"
];

const mainColors = [
    "#ffffff", "#e3f2fd", "#e8f5e9", "#f3e5f5", "#fff3e0",
    "#fce4ec", "#e0f7fa", "#f1f8e9", "#fff8e1", "#eceff1",
    "#cfd8dc", "#b0bec5", "#90a4ae", "#78909c", "#546e7a",
    "#5c6bc0", "#7e57c2", "#5e35b1", "#3949ab", "#1a237e",
    "#283593", "#303f9f", "#3949ab", "#3f51b5", "#4285f4",
    "#448aff", "#2979ff", "#29b6f6", "#00bcd4", "#0097a7",
    "#00838f", "#006064", "#00acc1", "#00bcd4", "#4dd0e2",
    "#18ffff", "#69f0ae", "#b9f6ca", "#ccff90", "#dce775",
    "#f0f4c3", "#f9fbc7", "#fef9c7", "#fff9c4", "#ffecb3",
    "#ffe082", "#ffd54f", "#ffca28", "#ffb74d", "#ff9800",
    "#ef6c00", "#e65100", "#d84315", "#bf360c", "#795548",
    "#8d6e63", "#a1887f", "#bc987b", "#d7ccc8", "#efebe9",
    "#f5f5f5", "#eeeeee", "#e0e0e0", "#bdbdbd", "#9e9e9e",
    "#757575", "#616161", "#424242", "#212121"
];

const highlightColors = [
    "#1565c0", "#0d47a1", "#0039cb", "#0052a3", "#0066cc",
    "#1976d2", "#1976d2", "#303f9f", "#5e35b1", "#673ab7",
    "#512da8", "#d81b60", "#ad1457", "#880e4f", "#c2185b",
    "#ff1744", "#f44336", "#e53935", "#d32f2f", "#b71c1c",
    "#ff5722", "#e64a19", "#f57c00", "#ff8f00", "#ffab00",
    "#ffca28", "#ffc107", "#ffb300", "#ffca28", "#ffd54f",
    "#cddc39", "#dce623", "#9ccc62", "#7cb342", "#558b2f",
    "#33691e", "#388e3c", "#43a047", "#66bb6a", "#81c784",
    "#a5d6a7", "#69f0ae", "#00e676", "#00c853", "#009624",
    "#00bfa5", "#26a69a", "#00acc1", "#26c6da", "#4dd0e1",
    "#29b6f6", "#4fc3f7", "#81d4fa", "#b3e5fc", "#80deea",
    "#4db6ac", "#80cbc4", "#4db6ac", "#26a69a", "#00897b",
    "#a1887f", "#8d6e63", "#795548", "#5d4037", "#3e2723",
    "#8e24aa", "#6a1b9a", "#4a148c", "#7b1fa2", "#8e24aa",
    "#ab47bc", "#8e24aa", "#ab47bc", "#7e57c2", "#5e35b1",
    "#512da8", "#6200ea", "#311b92", "#3d00c4", "#4a148c",
    "#6a1b9a", "#8e24aa", "#ab47bc", "#ce93d8", "#e1bee7"
];

const loadingMessages = [
    "Reticulating splines...",
    "Feeding the dolphins...",
    "Polishing the propeller...",
    "Calibrating altimeter...",
    "Finding the runway...",
    "Tying down loose bolts...",
    "Checking fuel levels...",
    "Inflating tires...",
    "Installing snacks...",
    "Teaching birds to fly away...",
    "Warming up the engine...",
    " untangling flight paths...",
    "Coordinating clouds...",
    "Measuring island heights...",
    "Testing gravity...",
    "Counting palm trees...",
    "Smoothing ocean waves...",
    "Loading the loading screen..."
];
let currentMessageIndex = 0;

// Current color indices
let mainColorIndex = 0;
let highlightColorIndex = 0;

function updateColorDisplay() {
    const mainDisplay = document.getElementById('main-color-display');
    const highlightDisplay = document.getElementById('highlight-color-display');
    
    if (mainDisplay) {
        mainDisplay.style.backgroundColor = mainColors[mainColorIndex];
    }
    
    if (highlightDisplay) {
        highlightDisplay.style.backgroundColor = highlightColors[highlightColorIndex];
    }
    
    // Update aircraft colors if aircraft exists
    if (typeof aircraft !== 'undefined' && aircraft && typeof aircraft.setColors === 'function') {
        aircraft.setColors({
            main: mainColors[mainColorIndex],
            highlight: highlightColors[highlightColorIndex]
        });
    }
}

function setRandomColors() {
    mainColorIndex = Math.floor(Math.random() * mainColors.length);
    
    let newHighlightIndex = Math.floor(Math.random() * highlightColors.length);
    while (highlightColors[newHighlightIndex] === mainColors[mainColorIndex] && highlightColors.length > 1) {
        newHighlightIndex = Math.floor(Math.random() * highlightColors.length);
    }
    highlightColorIndex = newHighlightIndex;
    
    updateColorDisplay();
}

function setRandomName() {
    const nameInput = document.getElementById('plane-name');
    if (nameInput) {
        const randomName = planeNames[Math.floor(Math.random() * planeNames.length)];
        nameInput.value = randomName;
    }
}

document.addEventListener('DOMContentLoaded', function() {
    const randomNameBtn = document.getElementById('random-name-btn');
    const randomColorsBtn = document.getElementById('random-colors-btn');
    const mainColorLeft = document.getElementById('main-color-left');
    const mainColorRight = document.getElementById('main-color-right');
    const highlightColorLeft = document.getElementById('highlight-color-left');
    const highlightColorRight = document.getElementById('highlight-color-right');
    
    if (randomNameBtn) {
        randomNameBtn.addEventListener('click', setRandomName);
    }
    
    if (randomColorsBtn) {
        randomColorsBtn.addEventListener('click', setRandomColors);
    }
    
    if (mainColorLeft) {
        mainColorLeft.addEventListener('click', function() {
            mainColorIndex = (mainColorIndex - 1 + mainColors.length) % mainColors.length;
            updateColorDisplay();
        });
    }
    
    if (mainColorRight) {
        mainColorRight.addEventListener('click', function() {
            mainColorIndex = (mainColorIndex + 1) % mainColors.length;
            updateColorDisplay();
        });
    }
    
    if (highlightColorLeft) {
        highlightColorLeft.addEventListener('click', function() {
            highlightColorIndex = (highlightColorIndex - 1 + highlightColors.length) % highlightColors.length;
            updateColorDisplay();
        });
    }
    
    if (highlightColorRight) {
        highlightColorRight.addEventListener('click', function() {
            highlightColorIndex = (highlightColorIndex + 1) % highlightColors.length;
            updateColorDisplay();
        });
    }
    
    // Set initial values
    updateColorDisplay();
    setRandomName();
    setRandomColors();
    
    // Handle orientation change - force repaint of loading screen
    window.addEventListener('orientationchange', function() {
        setTimeout(function() {
            window.dispatchEvent(new Event('resize'));
        }, 100);
    });
    
    // Also handle resize for browser-based orientation changes
    window.addEventListener('resize', function() {
        const loadingEl = document.getElementById('loading');
        if (loadingEl && loadingEl.style.display !== 'none' && !loadingEl.classList.contains('hidden')) {
            // Trigger reflow to fix any layout issues
            const display = loadingEl.style.display;
            loadingEl.style.display = 'none';
            void loadingEl.offsetHeight; // Force reflow
            loadingEl.style.display = display || 'flex';
        }
    });
    
    // Menu buttons - show loading screen to change name/colors
    const desktopMenuBtn = document.getElementById('desktop-menu-btn');
    const menuBtn = document.getElementById('menu-btn');
    
    function handleMenuClick() {
        showLoading();
    }
    
    if (desktopMenuBtn) {
        desktopMenuBtn.addEventListener('click', handleMenuClick);
    }
    if (menuBtn) {
        menuBtn.addEventListener('click', handleMenuClick);
    }
});

// ========== MAIN =======
        var scene, camera, renderer, aircraft, orbitCamera, cloudSystem, wildlife, clock;
        
        function updateLoading(progress) {
            const progressEl = document.getElementById('loading-progress');
            const barFillEl = document.getElementById('loading-bar-fill');
            const planeEl = document.getElementById('loading-plane');
            const textEl = document.getElementById('loading-text');
            
            if (progressEl) progressEl.textContent = progress + '%';
            if (barFillEl) barFillEl.style.width = progress + '%';
            if (planeEl) planeEl.style.left = progress + '%';
            
            // Cycle through loading messages based on progress
            if (textEl) {
                const messageIndex = Math.floor((progress / 100) * loadingMessages.length);
                const actualIndex = Math.min(messageIndex, loadingMessages.length - 1);
                if (actualIndex !== currentMessageIndex || progress === 0) {
                    currentMessageIndex = actualIndex;
                    textEl.textContent = loadingMessages[currentMessageIndex];
                }
            }
        }
        
        function hideLoading() {
            const el = document.getElementById('loading');
            if (el) {
                el.classList.add('hidden');
                
                // Show menu buttons during gameplay
                const desktopMenuBtn = document.getElementById('desktop-menu-btn');
                const menuBtn = document.getElementById('menu-btn');
                if (desktopMenuBtn) desktopMenuBtn.classList.add('visible');
                if (menuBtn) menuBtn.classList.add('visible');
                
                setTimeout(() => {
                    el.style.display = 'none';
                }, 800);
            }
        }
        
        function showLoading() {
            const el = document.getElementById('loading');
            if (el) {
                el.style.display = 'flex';
                el.classList.remove('hidden');
                
                // Hide menu buttons during loading
                const desktopMenuBtn = document.getElementById('desktop-menu-btn');
                const menuBtn = document.getElementById('menu-btn');
                if (desktopMenuBtn) desktopMenuBtn.classList.remove('visible');
                if (menuBtn) menuBtn.classList.remove('visible');
            }
        }

        function init() {
            scene = new THREE.Scene();
            // Warm afternoon sky
            scene.background = new THREE.Color(0x87CEEB);
            scene.fog = new THREE.Fog(0x87CEEB, 2000, 15000);
            
            // Share scene with multiplayer
            if (typeof setMultiplayerScene === 'function') {
                setMultiplayerScene(scene);
            }
            
            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100000);
            camera.position.set(0, 150, -600);
            window.camera = camera; // Make globally accessible for FloraManager
            
            renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.shadowMap.enabled = true;
            document.body.appendChild(renderer.domElement);
            
            initControls();
            
            clock = new THREE.Clock();
            
                // Get the selected colors and create aircraft
                const selectedMainColor = mainColors[mainColorIndex];
                const selectedHighlightColor = highlightColors[highlightColorIndex];
                aircraft = new Aircraft({
                    main: selectedMainColor,
                    highlight: selectedHighlightColor
                });
            scene.add(aircraft.mesh);
            
            orbitCamera = new OrbitCamera(camera, aircraft);
            
            // Initialize multiplayer after aircraft is created
            if (typeof initMultiplayer === 'function') {
                initMultiplayer(scene);
            }
            
            console.log('Aircraft created with colors:', {
                main: selectedMainColor,
                highlight: selectedHighlightColor
            });
            
            // Initialize touch camera controls for mobile
            initTouchCameraControls(orbitCamera);
            
            createSky(scene);
            createOcean(scene, camera);
            
            cloudSystem = new CloudSystem(scene);
            
            updateLoading(10);
            createAllIslands(scene, (progress) => {
                updateLoading(10 + Math.round(progress * 0.8));
            }).then(() => {
                updateLoading(90);
                
                // Set aircraft to random start position near an island
                aircraft.setRandomStartPosition();
                
                // Position camera behind aircraft on initial spawn
                orbitCamera.resetBehindTarget();
                
                // Initialize fauna after islands are loaded
                const faunaManager = new FaunaManager(scene, camera);
                faunaManager.init();
                window.faunaManager = faunaManager;
                
                // Initialize hot air balloon system
                const balloonSystem = new HotAirBalloonSystem(scene, camera);
                window.balloonSystem = balloonSystem;
                
                // Initialize performance monitor
                const perfMonitor = new PerformanceMonitor();
                window.perfMonitor = perfMonitor;
                
                // Initialize gauge system
                const gaugeSystem = new GaugeSystem();
                window.gaugeSystem = gaugeSystem;
                
                updateLoading(90);
                
                // Show "Let's Soar!" button while final systems initialize
                const startButton = document.getElementById('start-button');
                const loadingBar = document.getElementById('loading-bar');
                const loadingText = document.getElementById('loading-text');
                
                if (startButton && loadingBar && loadingText) {
                    loadingBar.style.display = 'none';
                    loadingText.style.display = 'none';
                    startButton.style.display = 'block';
                    
                    startButton.onclick = () => {
                        init();
                        hideLoading();
                    };
                }
            });
            
            // Keep old wildlife for backward compatibility (balloons)
            wildlife = new Wildlife(scene);
            
            window.addEventListener('resize', onWindowResize);

            animate();
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function hideCrashMessage() {
            const crashMsg = document.getElementById('crash-message');
            if (crashMsg) {
                crashMsg.classList.remove('visible');
            }
        }

        function showCrashMessage() {
            const crashMsg = document.getElementById('crash-message');
            if (crashMsg) {
                crashMsg.classList.add('visible');
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();
            const time = clock.getElapsedTime();
            
            updateOceanWaves(time);
            
            const keyboardInput = getKeyboardInput();
            const touchInputData = getTouchInput();
            const mouseInput = getMouseInput();
            
            // Merge keyboard and touch inputs (touch takes priority if active)
            const input = {
                pitchUp: keyboardInput.pitchUp || touchInputData.pitch < -0.1,
                pitchDown: keyboardInput.pitchDown || touchInputData.pitch > 0.1,
                rollLeft: keyboardInput.rollLeft || touchInputData.roll < -0.1,
                rollRight: keyboardInput.rollRight || touchInputData.roll > 0.1,
                yawLeft: keyboardInput.yawLeft || touchInputData.yaw < -0.1,
                yawRight: keyboardInput.yawRight || touchInputData.yaw > 0.1,
                throttleUp: keyboardInput.throttleUp,
                throttleDown: keyboardInput.throttleDown,
                brake: keyboardInput.brake,
                reset: keyboardInput.reset || touchInputData.reset
            };
            
            orbitCamera.handleMouseInput(mouseInput.deltaX, mouseInput.deltaY);
            orbitCamera.handleScroll(mouseInput.scrollDelta);
            
            const controlInput = {
                pitch: (input.pitchUp ? -1 : 0) + (input.pitchDown ? 1 : 0),
                roll: (input.rollLeft ? -1 : 0) + (input.rollRight ? 1 : 0),
                yaw: (input.yawLeft ? -1 : 0) + (input.yawRight ? 1 : 0)
            };
            
            // Check for crash
            if (aircraft.checkCrash()) {
                showCrashMessage();
            }
            
            // If crashed, don't allow normal flight controls unless reset
            const crashMsg = document.getElementById('crash-message');
            const isCrashed = crashMsg && crashMsg.classList.contains('visible');
            
            if (!isCrashed) {
                aircraft.setControlInput(controlInput);
                
                // Handle throttle - mobile uses direct slider value, desktop uses up/down buttons
                if (isTouchDevice()) {
                    aircraft.setThrottle(touchInputData.throttle);
                } else {
                    aircraft.updateThrottle(input.throttleUp, input.throttleDown, delta);
                }
                
                aircraft.update(delta);
            }
            
            if (window.gaugeSystem) {
                window.gaugeSystem.updateSpeed(aircraft.ias);
                window.gaugeSystem.updateAltitude(aircraft.altitude * 3.281);
                window.gaugeSystem.updateThrottle(aircraft.throttle * 100);
            }

            const velocityDisplay = document.getElementById('velocity-display');
            if (velocityDisplay) {
                const speed = aircraft.velocity.length();
                const forward = new THREE.Vector3(0, 0, -1);
                forward.applyEuler(aircraft.rotation);
                const direction = aircraft.velocity.clone().normalize();
                const dot = forward.dot(direction);
                const signedSpeed = dot < 0 ? -speed : speed;
                const speedKts = signedSpeed * 1.944;
                velocityDisplay.textContent = `Speed: ${signedSpeed.toFixed(0)} m/s (${speedKts.toFixed(0)} kts)`;
            }

            if (input.reset) {
                hideCrashMessage();
                aircraft.reset();
                orbitCamera.resetBehindTarget();
            }
            
            orbitCamera.update(delta);
            cloudSystem.update(delta, time);
            wildlife.update(delta);
            
            // Update flora LOD and culling
            if (window.floraManager) {
                window.floraManager.update(delta);
            }
            
            // Update fauna (animals)
            if (window.faunaManager) {
                window.faunaManager.update(delta);
            }
            
            // Update hot air balloons
            if (window.balloonSystem) {
                window.balloonSystem.update(delta);
            }
            
            // Update performance monitor
            if (window.perfMonitor) {
                window.perfMonitor.update();
            }
            
            // Update multiplayer name labels visibility and distance dots
            if (typeof updateMultiplayerLabels === 'function' && camera && renderer) {
                updateMultiplayerLabels(camera, renderer);
            }
            
            // Update multiplayer position interpolation (smooth movement)
            if (typeof updateMultiplayerInterpolation === 'function') {
                updateMultiplayerInterpolation(delta);
            }
            
            renderer.render(scene, camera);
        }

        init();
    </script>
</body>
</html>
