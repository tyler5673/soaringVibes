<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flight Simulator</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { overflow: hidden; background: #000; }
        #hud { position: fixed; top: 20px; left: 20px; color: #0f0; font-size: 16px; text-shadow: 1px 1px 2px #000; pointer-events: none; z-index: 100; }
        #hud div { margin-bottom: 8px; }
        #controls-hint { margin-top: 20px; font-size: 12px; color: #888; }
    </style>
</head>
<body>
    <div id="hud">
        <div id="speed">Speed: <span id="speed-value">0</span> kts</div>
        <div id="altitude">Altitude: <span id="altitude-value">0</span> ft</div>
        <div id="throttle">Throttle: <span id="throttle-value">0</span>%</div>
        <div id="controls-hint">WASD: Pitch/Roll | QE: Yaw | Shift/Ctrl: Throttle | Space: Brake | R: Reset</div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
    <script>
        // ========== UTILS ==========
        function degreesToRadians(degrees) {
            return degrees * (Math.PI / 180);
        }

        function radiansToDegrees(radians) {
            return radians * (180 / Math.PI);
        }

        function clamp(value, min, max) {
            return Math.max(min, Math.min(max, value));
        }

        function lerp(start, end, t) {
            return start + (end - start) * t;
        }

        // ========== CONTROLS ==========
        const keys = {};
        const mouse = { x: 0, y: 0, deltaX: 0, deltaY: 0 };
        let scrollDelta = 0;

        const GAME_KEYS = new Set([
            'KeyW', 'KeyA', 'KeyS', 'KeyD', 'KeyQ', 'KeyE', 'KeyR',
            'Space', 'ShiftLeft', 'ShiftRight', 'ControlLeft', 'ControlRight',
            'ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'
        ]);

        function initControls() {
            window.addEventListener('keydown', (e) => {
                keys[e.code] = true;
                if (GAME_KEYS.has(e.code)) e.preventDefault();
            });
            
            window.addEventListener('keyup', (e) => {
                keys[e.code] = false;
            });
            
            window.addEventListener('mousemove', (e) => {
                mouse.deltaX = e.movementX || 0;
                mouse.deltaY = e.movementY || 0;
                mouse.x = e.clientX;
                mouse.y = e.clientY;
            });
            
            window.addEventListener('wheel', (e) => {
                scrollDelta += e.deltaY;
                if (Math.abs(scrollDelta) > 10000) scrollDelta = 0;
                e.preventDefault();
            }, { passive: false });
        }

        function getKeyboardInput() {
            return {
                pitchUp: keys['KeyW'] || keys['ArrowUp'],
                pitchDown: keys['KeyS'] || keys['ArrowDown'],
                rollLeft: keys['KeyA'] || keys['ArrowLeft'],
                rollRight: keys['KeyD'] || keys['ArrowRight'],
                yawLeft: keys['KeyQ'],
                yawRight: keys['KeyE'],
                throttleUp: keys['ShiftLeft'] || keys['ShiftRight'],
                throttleDown: keys['ControlLeft'] || keys['ControlRight'],
                brake: keys['Space'],
                reset: keys['KeyR']
            };
        }

        function getMouseInput() {
            const result = {
                deltaX: mouse.deltaX,
                deltaY: mouse.deltaY,
                scrollDelta: scrollDelta
            };
            mouse.deltaX = 0;
            mouse.deltaY = 0;
            scrollDelta = 0;
            return result;
        }

        // ========== AIRCRAFT ==========
        class Aircraft {
            constructor() {
                this.mass = 5000;
                this.wingArea = 30;
                this.maxThrust = 50000;
                this.maxSpeed = 250;
                this.airDensity = 1.225;
                this.rollRate = degreesToRadians(60);
                this.pitchRate = degreesToRadians(40);
                this.yawRate = degreesToRadians(30);
                
                this.position = new THREE.Vector3(0, 2, -1500);
                this.velocity = new THREE.Vector3(0, 0, 0);
                this.rotation = new THREE.Euler(0, Math.PI, 0, 'YXZ');
                this.throttle = 0.3;
                this.altitude = 3;
                
                this.controlInput = { pitch: 0, roll: 0, yaw: 0 };
                this.ias = 0;
                this.groundSpeed = 0;
                
                this.mesh = this.createMesh();
            }
            
            createMesh() {
                const group = new THREE.Group();
                
                const fuselageGeo = new THREE.CylinderGeometry(0.5, 0.3, 8, 8);
                fuselageGeo.rotateX(Math.PI / 2);
                const fuselageMat = new THREE.MeshStandardMaterial({ color: 0xcccccc });
                const fuselage = new THREE.Mesh(fuselageGeo, fuselageMat);
                group.add(fuselage);
                
                const wingGeo = new THREE.BoxGeometry(12, 0.1, 1.5);
                const wingMat = new THREE.MeshStandardMaterial({ color: 0xaaaaaa });
                const wings = new THREE.Mesh(wingGeo, wingMat);
                wings.position.set(0, 0, 0.5);
                group.add(wings);
                
                const tailHGeo = new THREE.BoxGeometry(4, 0.1, 1);
                const tailH = new THREE.Mesh(tailHGeo, wingMat);
                tailH.position.set(0, 0, 3.5);
                group.add(tailH);
                
                const tailVGeo = new THREE.BoxGeometry(0.1, 2, 1);
                const tailV = new THREE.Mesh(tailVGeo, wingMat);
                tailV.position.set(0, 1, 3.5);
                group.add(tailV);
                
                const cockpitGeo = new THREE.SphereGeometry(0.6, 8, 8);
                cockpitGeo.scale(1, 0.6, 1.2);
                const cockpitMat = new THREE.MeshStandardMaterial({ color: 0x3366ff, transparent: true, opacity: 0.7 });
                const cockpit = new THREE.Mesh(cockpitGeo, cockpitMat);
                cockpit.position.set(0, 0.4, -1.5);
                group.add(cockpit);
                
                const wheelGeo = new THREE.CylinderGeometry(0.2, 0.2, 0.1, 8);
                wheelGeo.rotateZ(Math.PI / 2);
                const wheelMat = new THREE.MeshStandardMaterial({ color: 0x222222 });
                
                const frontWheel = new THREE.Mesh(wheelGeo, wheelMat);
                frontWheel.position.set(0, -0.5, -2);
                group.add(frontWheel);
                
                const leftWheel = new THREE.Mesh(wheelGeo, wheelMat);
                leftWheel.position.set(-1.5, -0.5, 2);
                group.add(leftWheel);
                
                const rightWheel = new THREE.Mesh(wheelGeo, wheelMat);
                rightWheel.position.set(1.5, -0.5, 2);
                group.add(rightWheel);
                
                group.castShadow = true;
                return group;
            }
            
            setControlInput(input) {
                this.controlInput.pitch = input.pitch;
                this.controlInput.roll = input.roll;
                this.controlInput.yaw = input.yaw;
            }
            
            updateThrottle(throttleUp, throttleDown, delta) {
                const throttleSpeed = 0.5;
                if (throttleUp) this.throttle = Math.min(1, this.throttle + throttleSpeed * delta);
                if (throttleDown) this.throttle = Math.max(0, this.throttle - throttleSpeed * delta);
            }
            
            update(delta) {
                const forward = new THREE.Vector3(0, 0, -1);
                forward.applyEuler(this.rotation);
                
                const up = new THREE.Vector3(0, 1, 0);
                up.applyEuler(this.rotation);
                
                const thrustMagnitude = this.throttle * this.maxThrust;
                const thrust = forward.clone().multiplyScalar(thrustMagnitude);
                
                const speed = this.velocity.length();
                
                let aoa = 0;
                if (speed > 1) {
                    const velocityDir = this.velocity.clone().normalize();
                    aoa = forward.angleTo(velocityDir);
                    const pitchComponent = velocityDir.dot(up);
                    if (pitchComponent > 0) aoa = -aoa;
                }
                
                const stallAngle = degreesToRadians(15);
                let cl;
                if (Math.abs(aoa) < stallAngle) {
                    cl = 2 * Math.PI * aoa * 2;
                } else {
                    cl = 2 * Math.PI * stallAngle * 0.5 * Math.sign(aoa);
                }
                cl = clamp(cl, -1.5, 1.5);
                
                const cd0 = 0.025;
                const k = 0.04;
                const cd = cd0 + k * cl * cl;
                
                const q = 0.5 * this.airDensity * speed * speed;
                
                const lift = up.clone().multiplyScalar(q * this.wingArea * cl);
                const drag = this.velocity.clone().normalize().multiplyScalar(-q * this.wingArea * cd);
                
                const weight = new THREE.Vector3(0, -this.mass * 9.81, 0);
                
                const groundEffectHeight = 20;
                if (this.position.y < groundEffectHeight && this.position.y > 0) {
                    const effect = 1 - (this.position.y / groundEffectHeight);
                    lift.multiplyScalar(1 + effect * 0.5);
                    drag.multiplyScalar(1 - effect * 0.3);
                }
                
                const totalForce = new THREE.Vector3().add(thrust).add(lift).add(drag).add(weight);
                const acceleration = totalForce.divideScalar(this.mass);
                
                this.velocity.add(acceleration.multiplyScalar(delta));
                
                if (speed > this.maxSpeed) {
                    this.velocity.multiplyScalar(this.maxSpeed / speed);
                }
                
                this.position.add(this.velocity.clone().multiplyScalar(delta));
                
                if (this.position.y < 0) {
                    this.position.y = 0;
                    if (this.velocity.y < 0) this.velocity.y = 0;
                }
                
                this.updateRotation(delta, speed);
                
                this.altitude = this.position.y;
                this.groundSpeed = speed;
                this.ias = speed * 1.944;
                
                this.mesh.position.copy(this.position);
                this.mesh.rotation.copy(this.rotation);
            }
            
            updateRotation(delta, speed) {
                const controlEffectiveness = Math.min(1, speed / 30);
                
                this.rotation.x += this.controlInput.pitch * this.pitchRate * delta * controlEffectiveness;
                this.rotation.x = clamp(this.rotation.x, degreesToRadians(-45), degreesToRadians(45));
                
                this.rotation.z -= this.controlInput.roll * this.rollRate * delta * controlEffectiveness;
                this.rotation.z = clamp(this.rotation.z, degreesToRadians(-60), degreesToRadians(60));
                
                this.rotation.y += this.controlInput.yaw * this.yawRate * delta * controlEffectiveness;
                
                if (speed > 20) {
                    this.rotation.z *= 0.99;
                }
                
                if (speed > 20 && Math.abs(this.controlInput.pitch) < 0.1) {
                    this.rotation.x *= 0.98;
                }
                
                if (speed > 20) {
                    this.rotation.y += Math.sin(this.rotation.z) * 0.3 * delta;
                }
            }
            
            reset() {
                this.position.set(0, 2, -1500);
                this.velocity.set(0, 0, 0);
                this.rotation.set(0, Math.PI, 0);
                this.throttle = 0.3;
            }
        }

        // ========== ORBIT CAMERA ==========
        class OrbitCamera {
            constructor(camera, target) {
                this.camera = camera;
                this.target = target;
                this.distance = 25;
                this.minDistance = 8;
                this.maxDistance = 80;
                this.azimuth = 0;
                this.elevation = 0.3;
                this.orbitSensitivity = 0.005;
                this.zoomSensitivity = 0.05;
                this.smoothness = 5;
                this.currentPosition = new THREE.Vector3();
                this.currentLookAt = new THREE.Vector3();
            }
            
            handleMouseInput(deltaX, deltaY) {
                this.azimuth -= deltaX * this.orbitSensitivity;
                this.elevation += deltaY * this.orbitSensitivity;
                this.elevation = clamp(this.elevation, -Math.PI / 3, Math.PI / 2.5);
            }
            
            handleScroll(scrollDelta) {
                this.distance += scrollDelta * this.zoomSensitivity;
                this.distance = clamp(this.distance, this.minDistance, this.maxDistance);
            }
            
            update(delta) {
                if (!this.target) return;
                
                const targetPos = this.target.position.clone();
                
                const offset = new THREE.Vector3(
                    Math.sin(this.azimuth) * Math.cos(this.elevation) * this.distance,
                    Math.sin(this.elevation) * this.distance,
                    Math.cos(this.azimuth) * Math.cos(this.elevation) * this.distance
                );
                
                offset.y += 3;
                
                const desiredPosition = targetPos.clone().add(offset);
                
                const t = 1 - Math.exp(-this.smoothness * delta);
                this.currentPosition.lerp(desiredPosition, t);
                
                const lookAhead = new THREE.Vector3(0, 0, -5);
                lookAhead.applyEuler(this.target.rotation);
                this.currentLookAt.lerp(targetPos.clone().add(lookAhead), t);
                
                this.camera.position.copy(this.currentPosition);
                this.camera.lookAt(this.currentLookAt);
            }
        }

        // ========== ENVIRONMENT ==========
        function createSky(scene) {
            const sunGeo = new THREE.SphereGeometry(400, 32, 32);
            const sunMat = new THREE.MeshBasicMaterial({ color: 0xffff00 });
            const sun = new THREE.Mesh(sunGeo, sunMat);
            sun.position.set(8000, 6000, -10000);
            scene.add(sun);
            
            const sunLight = new THREE.DirectionalLight(0xffffee, 1.2);
            sunLight.position.copy(sun.position);
            sunLight.castShadow = true;
            sunLight.shadow.mapSize.width = 2048;
            sunLight.shadow.mapSize.height = 2048;
            sunLight.shadow.camera.near = 100;
            sunLight.shadow.camera.far = 20000;
            sunLight.shadow.camera.left = -2000;
            sunLight.shadow.camera.right = 2000;
            sunLight.shadow.camera.top = 2000;
            sunLight.shadow.camera.bottom = -2000;
            scene.add(sunLight);
            
            const hemiLight = new THREE.HemisphereLight(0x87CEEB, 0x006994, 0.6);
            scene.add(hemiLight);
        }

        let oceanMesh;
        
        function createOcean(scene) {
            const geometry = new THREE.PlaneGeometry(20000, 20000, 128, 128);
            const material = new THREE.MeshStandardMaterial({
                color: 0x006994,
                roughness: 0.3,
                metalness: 0.1,
                flatShading: false
            });
            oceanMesh = new THREE.Mesh(geometry, material);
            oceanMesh.rotation.x = -Math.PI / 2;
            oceanMesh.position.y = -1;
            oceanMesh.receiveShadow = true;
            oceanMesh.userData.originalPositions = geometry.attributes.position.array.slice();
            scene.add(oceanMesh);
        }
        
        function updateOceanWaves(time) {
            if (!oceanMesh) return;
            const positions = oceanMesh.geometry.attributes.position;
            const original = oceanMesh.userData.originalPositions;
            
            for (let i = 0; i < positions.count; i++) {
                const x = original[i * 3];
                const y = original[i * 3 + 1];
                
                const wave1 = Math.sin(x * 0.003 + time * 0.8) * Math.cos(y * 0.003 + time * 0.5) * 2;
                const wave2 = Math.sin(x * 0.008 + y * 0.006 + time * 1.2) * 1;
                const wave3 = Math.cos(x * 0.001 - y * 0.002 + time * 0.3) * 1.5;
                
                positions.setZ(i, wave1 + wave2 + wave3);
            }
            positions.needsUpdate = true;
            oceanMesh.geometry.computeVertexNormals();
        }

        function addPalmTrees(island, scale) {
            const trunkMat = new THREE.MeshStandardMaterial({ color: 0x8B4513 });
            const leafMat = new THREE.MeshStandardMaterial({ color: 0x228B22 });
            const darkLeafMat = new THREE.MeshStandardMaterial({ color: 0x1B5E20 });
            
            for (let i = 0; i < 8; i++) {
                const angle = Math.random() * Math.PI * 2;
                const radius = 80 * scale * Math.random() + 20 * scale;
                
                const trunkHeight = 5 * scale + Math.random() * 3 * scale;
                const trunkGeo = new THREE.CylinderGeometry(0.2 * scale, 0.5 * scale, trunkHeight, 6);
                const trunk = new THREE.Mesh(trunkGeo, trunkMat);
                trunk.position.set(Math.cos(angle) * radius, trunkHeight / 2, Math.sin(angle) * radius);
                trunk.rotation.z = (Math.random() - 0.5) * 0.15;
                trunk.castShadow = true;
                island.add(trunk);
                
                const leafCount = 2 + Math.floor(Math.random() * 2);
                for (let j = 0; j < leafCount; j++) {
                    const leafGeo = new THREE.ConeGeometry(2.5 * scale + Math.random() * 2 * scale, 2 * scale + Math.random() * 1.5 * scale, 5);
                    const leaf = new THREE.Mesh(leafGeo, Math.random() > 0.5 ? leafMat : darkLeafMat);
                    leaf.position.set(
                        trunk.position.x + (Math.random() - 0.5) * 2 * scale,
                        trunkHeight + 1.5 * scale + j * 1.5 * scale,
                        trunk.position.z + (Math.random() - 0.5) * 2 * scale
                    );
                    leaf.rotation.x = -0.3 + Math.random() * 0.6;
                    leaf.rotation.z = Math.random() * Math.PI * 2;
                    leaf.castShadow = true;
                    island.add(leaf);
                }
            }
        }

        function addBuildings(island, scale) {
            const buildingColors = [0xFFFAF0, 0xE8E8E8, 0xFFF8DC, 0xF5F5DC, 0xFFE4C4];
            const roofColors = [0xFF6B6B, 0x4169E1, 0x228B22, 0x8B4513, 0x696969];
            
            for (let i = 0; i < 4; i++) {
                const width = (8 + Math.random() * 10) * scale;
                const height = (6 + Math.random() * 10) * scale;
                const depth = (8 + Math.random() * 10) * scale;
                
                const buildingGeo = new THREE.BoxGeometry(width, height, depth);
                const buildingMat = new THREE.MeshStandardMaterial({ color: buildingColors[i % buildingColors.length] });
                const building = new THREE.Mesh(buildingGeo, buildingMat);
                
                const angle = Math.random() * Math.PI * 2;
                const dist = 60 * scale + Math.random() * 80 * scale;
                building.position.set(
                    Math.cos(angle) * dist,
                    height / 2,
                    Math.sin(angle) * dist
                );
                building.castShadow = true;
                island.add(building);
                
                const roofGeo = new THREE.BoxGeometry(width * 1.1, 2 * scale, depth * 1.1);
                const roofMat = new THREE.MeshStandardMaterial({ color: roofColors[i % roofColors.length] });
                const roof = new THREE.Mesh(roofGeo, roofMat);
                roof.position.set(building.position.x, height + 1 * scale, building.position.z);
                roof.castShadow = true;
                island.add(roof);
            }
        }

        // Simple noise function for terrain
        function noise(x, z, seed = 0) {
            const n = Math.sin(x * 0.01 + seed) * Math.cos(z * 0.01 + seed) +
                      Math.sin(x * 0.02 + z * 0.015 + seed) * 0.5 +
                      Math.sin(x * 0.005 + seed) * Math.cos(z * 0.008 + seed) * 0.3;
            return n;
        }

        function createIsland(scene, x, z, scale = 1, hasAirport = false) {
            const group = new THREE.Group();
            const baseRadius = 300 * scale;
            const seed = x * 0.1 + z * 0.1;
            
            // Organic island shape using noise
            function getIslandShape(px, pz) {
                const angle = Math.atan2(pz, px);
                const baseR = baseRadius * (0.7 + 0.3 * Math.sin(angle * 3 + seed) * Math.cos(angle * 2 + seed * 0.5));
                const noiseR = noise(px * 0.02, pz * 0.02, seed) * baseRadius * 0.3;
                return baseR + noiseR;
            }
            
            // Terrain mesh - organic shape with noise-based heightmap
            const terrainSize = baseRadius * 2.8;
            const segments = 60;
            const terrainGeo = new THREE.PlaneGeometry(terrainSize, terrainSize, segments, segments);
            terrainGeo.rotateX(-Math.PI / 2);
            
            const posAttr = terrainGeo.attributes.position;
            
            for (let i = 0; i < posAttr.count; i++) {
                const px = posAttr.getX(i);
                const pz = posAttr.getZ(i);
                const dist = Math.sqrt(px * px + pz * pz);
                const shapeRadius = getIslandShape(px, pz);
                
                if (dist > shapeRadius * 1.1) {
                    posAttr.setY(i, -20);
                    continue;
                }
                
                let height;
                if (hasAirport && dist < 200 * scale) {
                    height = 2;
                } else if (hasAirport && dist < 280 * scale) {
                    const t = (dist - 200 * scale) / (80 * scale);
                    const n = noise(px * 0.5, pz * 0.5, seed);
                    height = 2 + t * t * (n * 25 * scale + 15 * scale);
                } else if (dist < shapeRadius) {
                    const n = noise(px * 0.5, pz * 0.5, seed);
                    const edgeFactor = 1 - (dist / shapeRadius);
                    height = Math.max(2, n * 40 * scale + edgeFactor * edgeFactor * 60 * scale);
                } else {
                    height = -5;
                }
                posAttr.setY(i, height);
            }
            terrainGeo.computeVertexNormals();
            
            const terrainMat = new THREE.MeshStandardMaterial({ 
                color: 0x228B22, 
                roughness: 0.9,
                flatShading: true,
                side: THREE.DoubleSide
            });
            const terrain = new THREE.Mesh(terrainGeo, terrainMat);
            terrain.position.y = 0;
            terrain.receiveShadow = true;
            group.add(terrain);
            
            // Complex organic beach with noise-based irregular edges
            const beachOuterPoints = [];
            const beachInnerPoints = [];
            const beachSegments = 64;
            
            for (let i = 0; i < beachSegments; i++) {
                const angle = (i / beachSegments) * Math.PI * 2;
                const noiseVal = noise(Math.cos(angle) * 8, Math.sin(angle) * 8, seed * 2);
                const outerR = baseRadius * (1.05 + noiseVal * 0.15);
                const innerR = baseRadius * (0.65 + noiseVal * 0.1);
                
                beachOuterPoints.push(new THREE.Vector2(Math.cos(angle) * outerR, Math.sin(angle) * outerR));
                beachInnerPoints.push(new THREE.Vector2(Math.cos(angle) * innerR, Math.sin(angle) * innerR));
            }
            
            const beachShape = new THREE.Shape(beachOuterPoints);
            beachShape.holes.push(new THREE.Path(beachInnerPoints));
            
            const beachGeo = new THREE.ShapeGeometry(beachShape);
            beachGeo.rotateX(-Math.PI / 2);
            const beachMat = new THREE.MeshStandardMaterial({ color: 0xF4D03F, roughness: 1 });
            const beach = new THREE.Mesh(beachGeo, beachMat);
            beach.position.y = 3;
            beach.receiveShadow = true;
            group.add(beach);
            
            // Mountains - complex multi-part meshes
            const mountainCount = hasAirport ? 2 : 4;
            const mountainPositions = [];
            for (let i = 0; i < mountainCount; i++) {
                const angle = (i / mountainCount) * Math.PI * 2 + Math.random() * 0.5;
                const dist = baseRadius * 0.35 * Math.random() + baseRadius * 0.15;
                mountainPositions.push({
                    x: Math.cos(angle) * dist,
                    z: Math.sin(angle) * dist,
                    h: (60 + Math.random() * 80) * scale,
                    r: (20 + Math.random() * 30) * scale
                });
            }
            
            const mountainMat = new THREE.MeshStandardMaterial({ color: 0x5D6D4E, roughness: 0.85, flatShading: true });
            const darkMountainMat = new THREE.MeshStandardMaterial({ color: 0x3D4D3E, roughness: 0.9, flatShading: true });
            const snowMat = new THREE.MeshStandardMaterial({ color: 0xFFFFFF, roughness: 0.9 });
            const rockMat = new THREE.MeshStandardMaterial({ color: 0x666666, roughness: 0.9, flatShading: true });
            
            mountainPositions.forEach(mp => {
                // Main mountain body - irregular shape using multiple merged geometries
                const mainGeo = new THREE.ConeGeometry(mp.r, mp.h, 6);
                const mountain = new THREE.Mesh(mainGeo, Math.random() > 0.4 ? mountainMat : darkMountainMat);
                mountain.position.set(mp.x, mp.h / 2 + 2, mp.z);
                mountain.rotation.y = Math.random() * Math.PI;
                mountain.scale.set(1 + Math.random() * 0.2, 1, 1 + Math.random() * 0.2);
                mountain.castShadow = true;
                group.add(mountain);
                
                // Secondary rocky outcrop
                const rock2Geo = new THREE.DodecahedronGeometry(mp.r * 0.4, 0);
                const rock2 = new THREE.Mesh(rock2Geo, rockMat);
                rock2.position.set(mp.x + mp.r * 0.3, mp.h * 0.5, mp.z + mp.r * 0.2);
                rock2.rotation.set(Math.random(), Math.random(), Math.random());
                rock2.scale.set(1, 0.6, 1);
                rock2.castShadow = true;
                group.add(rock2);
                
                // Snow cap with irregular edges
                if (mp.h > 80 * scale) {
                    const snowCapGroup = new THREE.Group();
                    
                    const snowBase = new THREE.ConeGeometry(mp.r * 0.5, mp.h * 0.25, 6);
                    const snow = new THREE.Mesh(snowBase, snowMat);
                    snow.position.y = mp.h * 0.4;
                    snowCapGroup.add(snow);
                    
                    // Add snow patches
                    for (let j = 0; j < 3; j++) {
                        const patchGeo = new THREE.SphereGeometry(mp.r * 0.15, 5, 4);
                        const patch = new THREE.Mesh(patchGeo, snowMat);
                        patch.position.set(
                            (Math.random() - 0.5) * mp.r * 0.3,
                            mp.h * 0.35 + Math.random() * mp.h * 0.1,
                            (Math.random() - 0.5) * mp.r * 0.3
                        );
                        patch.scale.y = 0.5;
                        snowCapGroup.add(patch);
                    }
                    
                    snowCapGroup.position.set(mp.x, mp.h / 2 + 2, mp.z);
                    snowCapGroup.castShadow = true;
                    group.add(snowCapGroup);
                }
            });
            
            // Rocky outcrops - smaller scale
            for (let i = 0; i < 6; i++) {
                const angle = Math.random() * Math.PI * 2;
                const dist = baseRadius * 0.15 + Math.random() * baseRadius * 0.35;
                const rockGeo = new THREE.DodecahedronGeometry(2 * scale * (0.3 + Math.random() * 0.4), 0);
                const rock = new THREE.Mesh(rockGeo, rockMat);
                rock.position.set(
                    Math.cos(angle) * dist,
                    1 * scale,
                    Math.sin(angle) * dist
                );
                rock.rotation.set(Math.random() * Math.PI, Math.random() * Math.PI, Math.random() * Math.PI);
                rock.scale.y = 0.4 + Math.random() * 0.4;
                rock.castShadow = true;
                group.add(rock);
            }
            
            if (!hasAirport) {
                addPalmTrees(group, scale);
                addBuildings(group, scale);
            }
            
            group.position.set(x, 0, z);
            scene.add(group);
            return group;
        }

        function createAirport(scene, x, z) {
            const group = new THREE.Group();
            
            const runwayLength = 600;
            const runwayWidth = 30;
            
            // Rotate runway 90 degrees so it runs along Z axis (same as aircraft direction)
            group.rotation.y = Math.PI / 2;
            
            const runwayGeo = new THREE.PlaneGeometry(runwayLength, runwayWidth);
            const runwayMat = new THREE.MeshStandardMaterial({ color: 0x333333, roughness: 0.8 });
            const runway = new THREE.Mesh(runwayGeo, runwayMat);
            runway.rotation.x = -Math.PI / 2;
            runway.receiveShadow = true;
            group.add(runway);
            
            const markingGeo = new THREE.PlaneGeometry(15, 1.5);
            const markingMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
            
            for (let i = -250; i < 250; i += 40) {
                const marking = new THREE.Mesh(markingGeo, markingMat);
                marking.rotation.x = -Math.PI / 2;
                marking.position.set(i, 0.1, 0);
                group.add(marking);
            }
            
            const centerlineGeo = new THREE.PlaneGeometry(runwayLength, 0.4);
            const centerline = new THREE.Mesh(centerlineGeo, markingMat);
            centerline.rotation.x = -Math.PI / 2;
            centerline.position.y = 0.1;
            group.add(centerline);
            
            const thresholdMat = new THREE.MeshBasicMaterial({ color: 0xffff00 });
            for (let i = -12; i <= 12; i += 3) {
                const thresh = new THREE.Mesh(new THREE.PlaneGeometry(2, 5), thresholdMat);
                thresh.rotation.x = -Math.PI / 2;
                thresh.position.set(-270, 0.1, i * 1.1);
                group.add(thresh);
                
                const thresh2 = thresh.clone();
                thresh2.position.set(270, 0.1, i * 1.1);
                group.add(thresh2);
            }
            
            const taxiwayGeo = new THREE.PlaneGeometry(100, 20);
            const taxiway = new THREE.Mesh(taxiwayGeo, runwayMat);
            taxiway.rotation.x = -Math.PI / 2;
            taxiway.position.set(320, 0.01, 80);
            taxiway.receiveShadow = true;
            group.add(taxiway);
            
            const apronGeo = new THREE.PlaneGeometry(150, 100);
            const apron = new THREE.Mesh(apronGeo, runwayMat);
            apron.rotation.x = -Math.PI / 2;
            apron.position.set(380, 0.01, 150);
            apron.receiveShadow = true;
            group.add(apron);
            
            const terminalGeo = new THREE.BoxGeometry(80, 15, 30);
            const terminalMat = new THREE.MeshStandardMaterial({ color: 0xDDDDDD });
            const terminal = new THREE.Mesh(terminalGeo, terminalMat);
            terminal.position.set(380, 7.5, 200);
            terminal.castShadow = true;
            group.add(terminal);
            
            const terminalRoofGeo = new THREE.BoxGeometry(90, 3, 40);
            const terminalRoofMat = new THREE.MeshStandardMaterial({ color: 0x4169E1 });
            const terminalRoof = new THREE.Mesh(terminalRoofGeo, terminalRoofMat);
            terminalRoof.position.set(380, 20, 200);
            terminalRoof.castShadow = true;
            group.add(terminalRoof);
            
            const towerGeo = new THREE.CylinderGeometry(4, 5, 30, 8);
            const towerMat = new THREE.MeshStandardMaterial({ color: 0xFFFFFF });
            const tower = new THREE.Mesh(towerGeo, towerMat);
            tower.position.set(280, 15, 30);
            tower.castShadow = true;
            group.add(tower);
            
            const cabGeo = new THREE.BoxGeometry(10, 10, 10);
            const cab = new THREE.Mesh(cabGeo, towerMat);
            cab.position.set(280, 35, 30);
            cab.castShadow = true;
            group.add(cab);
            
            const hangarGeo = new THREE.BoxGeometry(60, 20, 50);
            const hangarMat = new THREE.MeshStandardMaterial({ color: 0xCC3333 });
            const hangar = new THREE.Mesh(hangarGeo, hangarMat);
            hangar.position.set(420, 10, 100);
            hangar.castShadow = true;
            group.add(hangar);
            
            const hangarRoofGeo = new THREE.BoxGeometry(70, 5, 60);
            const hangarRoofMat = new THREE.MeshStandardMaterial({ color: 0x333333 });
            const hangarRoof = new THREE.Mesh(hangarRoofGeo, hangarRoofMat);
            hangarRoof.position.set(420, 25, 100);
            group.add(hangarRoof);
            
            group.position.set(x, 2, z);
            scene.add(group);
        }

        // ========== CLOUDS ==========
        class CloudSystem {
            constructor(scene, count = 50) {
                this.clouds = [];
                this.scene = scene;
                
                for (let i = 0; i < count; i++) {
                    this.createCloud();
                }
            }
            
            createCloud() {
                const cloudGroup = new THREE.Group();
                
                const puffCount = 5 + Math.floor(Math.random() * 5);
                const puffGeo = new THREE.SphereGeometry(1, 8, 8);
                const puffMat = new THREE.MeshStandardMaterial({
                    color: 0xffffff,
                    transparent: true,
                    opacity: 0.9,
                    roughness: 1
                });
                
                for (let i = 0; i < puffCount; i++) {
                    const puff = new THREE.Mesh(puffGeo, puffMat);
                    puff.position.set(
                        (Math.random() - 0.5) * 30,
                        (Math.random() - 0.5) * 10,
                        (Math.random() - 0.5) * 20
                    );
                    puff.scale.setScalar(10 + Math.random() * 15);
                    cloudGroup.add(puff);
                }
                
                cloudGroup.position.set(
                    (Math.random() - 0.5) * 40000,
                    500 + Math.random() * 1500,
                    (Math.random() - 0.5) * 40000
                );
                
                cloudGroup.userData.velocity = new THREE.Vector3(
                    (Math.random() - 0.5) * 10,
                    0,
                    (Math.random() - 0.5) * 5
                );
                
                this.scene.add(cloudGroup);
                this.clouds.push(cloudGroup);
            }
            
            update(delta) {
                this.clouds.forEach(cloud => {
                    cloud.position.x += cloud.userData.velocity.x * delta;
                    cloud.position.z += cloud.userData.velocity.z * delta;
                    
                    if (cloud.position.x > 20000) cloud.position.x = -20000;
                    if (cloud.position.x < -20000) cloud.position.x = 20000;
                    if (cloud.position.z > 20000) cloud.position.z = -20000;
                    if (cloud.position.z < -20000) cloud.position.z = 20000;
                });
            }
        }

        // ========== WILDLIFE ==========
        class Wildlife {
            constructor(scene) {
                this.scene = scene;
                this.birds = [];
                this.balloons = [];
                
                this.createBirds(30);
                this.createBalloons(5);
            }
            
            createBirds(count) {
                const birdGeo = new THREE.ConeGeometry(0.5, 2, 4);
                birdGeo.rotateX(Math.PI / 2);
                const birdMat = new THREE.MeshStandardMaterial({ color: 0x222222 });
                
                for (let i = 0; i < count; i++) {
                    const bird = new THREE.Mesh(birdGeo, birdMat);
                    
                    bird.position.set(
                        (Math.random() - 0.5) * 20000,
                        100 + Math.random() * 500,
                        (Math.random() - 0.5) * 20000
                    );
                    
                    bird.userData = {
                        speed: 10 + Math.random() * 20,
                        direction: new THREE.Vector3(Math.random() - 0.5, 0, Math.random() - 0.5).normalize(),
                        turnTimer: Math.random() * 5
                    };
                    
                    bird.rotation.y = Math.atan2(bird.userData.direction.x, bird.userData.direction.z);
                    
                    this.scene.add(bird);
                    this.birds.push(bird);
                }
            }
            
            createBalloons(count) {
                const balloonGroup = new THREE.Group();
                
                const balloonGeo = new THREE.SphereGeometry(15, 16, 16);
                balloonGeo.scale(1, 1.3, 1);
                const colors = [0xFF6B6B, 0x4ECDC4, 0xFFE66D, 0x95E1D3, 0xF38181];
                const balloonMat = new THREE.MeshStandardMaterial({ color: 0xFF6B6B });
                const balloon = new THREE.Mesh(balloonGeo, balloonMat);
                balloon.position.y = 15;
                balloonGroup.add(balloon);
                
                const basketGeo = new THREE.BoxGeometry(5, 4, 5);
                const basketMat = new THREE.MeshStandardMaterial({ color: 0x8B4513 });
                const basket = new THREE.Mesh(basketGeo, basketMat);
                basket.position.y = -2;
                balloonGroup.add(basket);
                
                const ropeGeo = new THREE.CylinderGeometry(0.1, 0.1, 17);
                const ropeMat = new THREE.MeshStandardMaterial({ color: 0x333333 });
                [-2, 2].forEach(x => {
                    [-2, 2].forEach(z => {
                        const rope = new THREE.Mesh(ropeGeo, ropeMat);
                        rope.position.set(x, 6.5, z);
                        balloonGroup.add(rope);
                    });
                });
                
                for (let i = 0; i < count; i++) {
                    const balloon = balloonGroup.clone();
                    
                    balloon.children[0].material = balloon.children[0].material.clone();
                    balloon.children[0].material.color.setHex(colors[Math.floor(Math.random() * colors.length)]);
                    
                    balloon.position.set(
                        (Math.random() - 0.5) * 30000,
                        200 + Math.random() * 400,
                        (Math.random() - 0.5) * 30000
                    );
                    
                    balloon.userData = {
                        driftSpeed: 5 + Math.random() * 10,
                        driftDirection: new THREE.Vector3(Math.random() - 0.5, 0, Math.random() - 0.5).normalize(),
                        bobTimer: Math.random() * Math.PI * 2
                    };
                    
                    this.scene.add(balloon);
                    this.balloons.push(balloon);
                }
            }
            
            update(delta) {
                this.birds.forEach(bird => {
                    bird.userData.turnTimer -= delta;
                    
                    if (bird.userData.turnTimer <= 0) {
                        bird.userData.direction.set(Math.random() - 0.5, (Math.random() - 0.5) * 0.2, Math.random() - 0.5).normalize();
                        bird.userData.turnTimer = 2 + Math.random() * 5;
                        bird.rotation.y = Math.atan2(bird.userData.direction.x, bird.userData.direction.z);
                    }
                    
                    bird.position.x += bird.userData.direction.x * bird.userData.speed * delta;
                    bird.position.y += bird.userData.direction.y * bird.userData.speed * delta;
                    bird.position.z += bird.userData.direction.z * bird.userData.speed * delta;
                    
                    bird.rotation.z = -bird.userData.direction.x * 0.5;
                    
                    if (bird.position.x > 15000) bird.position.x = -15000;
                    if (bird.position.x < -15000) bird.position.x = 15000;
                    if (bird.position.z > 15000) bird.position.z = -15000;
                    if (bird.position.z < -15000) bird.position.z = 15000;
                    bird.position.y = Math.max(50, Math.min(800, bird.position.y));
                });
                
                this.balloons.forEach(balloon => {
                    balloon.userData.bobTimer += delta * 2;
                    
                    balloon.position.x += balloon.userData.driftDirection.x * balloon.userData.driftSpeed * delta;
                    balloon.position.y += Math.sin(balloon.userData.bobTimer) * 0.3;
                    balloon.position.z += balloon.userData.driftDirection.z * balloon.userData.driftSpeed * delta;
                    
                    balloon.rotation.y += delta * 0.1;
                    
                    if (balloon.position.x > 20000) balloon.position.x = -20000;
                    if (balloon.position.x < -20000) balloon.position.x = 20000;
                    if (balloon.position.z > 20000) balloon.position.z = -20000;
                    if (balloon.position.z < -20000) balloon.position.z = 20000;
                });
            }
        }

        // ========== MAIN ==========
        let scene, camera, renderer;
        let aircraft;
        let orbitCamera;
        let cloudSystem;
        let wildlife;
        let clock;
        let speedEl, altitudeEl, throttleEl;

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87CEEB);
            scene.fog = new THREE.Fog(0x87CEEB, 1000, 50000);
            
            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100000);
            camera.position.set(0, 30, -1650);
            
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            document.body.appendChild(renderer.domElement);
            
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
            scene.add(ambientLight);
            
            initControls();
            
            clock = new THREE.Clock();
            
            aircraft = new Aircraft();
            scene.add(aircraft.mesh);
            
            orbitCamera = new OrbitCamera(camera, aircraft);
            
            createSky(scene);
            createOcean(scene);
            
            createIsland(scene, 0, -1500, 2.5, true);
            createAirport(scene, 0, -1500);
            
            createIsland(scene, 1200, -2800, 1.5);
            createIsland(scene, -1000, -2600, 1.8);
            createIsland(scene, 1800, -500, 1.3);
            createIsland(scene, -1200, 200, 1.5);
            createIsland(scene, 500, 800, 1.2);
            
            cloudSystem = new CloudSystem(scene);
            wildlife = new Wildlife(scene);
            
            window.addEventListener('resize', onWindowResize);

            speedEl = document.getElementById('speed-value');
            altitudeEl = document.getElementById('altitude-value');
            throttleEl = document.getElementById('throttle-value');

            animate();
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();
            const time = clock.getElapsedTime();
            
            updateOceanWaves(time);
            
            const input = getKeyboardInput();
            const mouseInput = getMouseInput();
            
            orbitCamera.handleMouseInput(mouseInput.deltaX, mouseInput.deltaY);
            orbitCamera.handleScroll(mouseInput.scrollDelta);
            
            const controlInput = {
                pitch: (input.pitchUp ? -1 : 0) + (input.pitchDown ? 1 : 0),
                roll: (input.rollLeft ? -1 : 0) + (input.rollRight ? 1 : 0),
                yaw: (input.yawLeft ? -1 : 0) + (input.yawRight ? 1 : 0)
            };
            aircraft.setControlInput(controlInput);
            aircraft.updateThrottle(input.throttleUp, input.throttleDown, delta);
            aircraft.update(delta);
            
            if (speedEl) speedEl.textContent = Math.round(aircraft.ias);
            if (altitudeEl) altitudeEl.textContent = Math.round(aircraft.altitude * 3.281);
            if (throttleEl) throttleEl.textContent = Math.round(aircraft.throttle * 100);

            if (input.reset) {
                aircraft.reset();
            }
            
            orbitCamera.update(delta);
            cloudSystem.update(delta);
            wildlife.update(delta);
            
            renderer.render(scene, camera);
        }

        init();
    </script>
</body>
